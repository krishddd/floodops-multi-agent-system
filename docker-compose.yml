# FloodOps — one-command local/dev run. `docker compose up`.
# Backend boots with NO keys (deterministic mock fallbacks); set keys in .env to
# activate the LLM and live connectors. Build the ML variant with:
#   docker compose build --build-arg INCLUDE_ML=true backend
services:
  backend:
    build:
      context: ./backend
      args:
        INCLUDE_ML: "false"
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Allow the vite dev server origin through CORS.
      FRONTEND_ORIGIN: "http://localhost:5173"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
