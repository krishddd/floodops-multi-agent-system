<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FloodOps v3 — Real-time 3D flood monitoring, ensemble uncertainty visualization, and multi-agent orchestration">
    <title>FloodOps — Flood Monitoring & Response</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <!-- Full-viewport map canvas -->
    <div id="map-container"></div>

    <!-- Phase bar (top) -->
    <div id="phase-bar" class="glass-panel phase-bar">
        <div class="phase-dot active" data-phase="00">00</div>
        <div class="phase-connector"></div>
        <div class="phase-dot" data-phase="01">01</div>
        <div class="phase-connector"></div>
        <div class="phase-dot" data-phase="02">02</div>
        <div class="phase-connector"></div>
        <div class="phase-dot" data-phase="03">03</div>
        <div class="phase-connector"></div>
        <div class="phase-dot" data-phase="04">04</div>
        <div class="phase-connector"></div>
        <div class="phase-dot" data-phase="05">05</div>
        <div class="phase-connector"></div>
        <div class="phase-dot" data-phase="06">06</div>
    </div>

    <!-- Metrics bar (top-right) -->
    <div id="metrics-panel" class="glass-panel metrics-panel">
        <div class="metric">
            <span class="metric-label">Population at Risk</span>
            <span class="metric-value" id="metric-pop">—</span>
        </div>
        <div class="metric">
            <span class="metric-label">Peak ETA</span>
            <span class="metric-value" id="metric-eta">—</span>
        </div>
        <div class="metric">
            <span class="metric-label">Max Probability</span>
            <span class="metric-value" id="metric-prob">—</span>
        </div>
    </div>

    <!-- Layer panel (left sidebar) -->
    <div id="layer-panel" class="glass-panel layer-panel">
        <h3 class="panel-title">Layers</h3>
        <div class="layer-item" data-layer="floodZones">
            <input type="checkbox" id="layer-flood" checked><label for="layer-flood">Flood Zones</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="80" data-layer="floodZones">
        </div>
        <div class="layer-item" data-layer="floodDepth">
            <input type="checkbox" id="layer-depth" checked><label for="layer-depth">Flood Depth 3D</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="90" data-layer="floodDepth">
        </div>
        <div class="layer-item" data-layer="population">
            <input type="checkbox" id="layer-pop"><label for="layer-pop">Population Risk</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="70" data-layer="population">
        </div>
        <div class="layer-item" data-layer="evacuation">
            <input type="checkbox" id="layer-evac" checked><label for="layer-evac">Evacuation Arcs</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="85" data-layer="evacuation">
        </div>
        <div class="layer-item" data-layer="spaghetti">
            <input type="checkbox" id="layer-spag"><label for="layer-spag">Ensemble Spaghetti</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="60" data-layer="spaghetti">
        </div>
        <div class="layer-item" data-layer="sensors">
            <input type="checkbox" id="layer-sensors" checked><label for="layer-sensors">Sensors</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="95" data-layer="sensors">
        </div>
        <div class="layer-item" data-layer="glacialLakes">
            <input type="checkbox" id="layer-lakes"><label for="layer-lakes">Glacial Lakes</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="80" data-layer="glacialLakes">
        </div>
        <div id="data-cadence" class="data-cadence"></div>
    </div>

    <!-- Timeline scrubber (bottom) -->
    <div id="timeline-panel" class="glass-panel timeline-panel">
        <div class="timeline-controls">
            <button id="timeline-play" class="timeline-btn">▶</button>
            <button id="timeline-pause" class="timeline-btn" style="display:none">⏸</button>
            <select id="timeline-speed" class="timeline-speed">
                <option value="1">1×</option>
                <option value="2">2×</option>
                <option value="4" selected>4×</option>
            </select>
        </div>
        <div class="timeline-track">
            <span class="timeline-label">T-72h</span>
            <input type="range" id="timeline-slider" min="0" max="100" value="50" class="timeline-slider">
            <span class="timeline-label">T+10d</span>
        </div>
        <div class="timeline-info">
            <span id="timeline-current">NOW</span>
            <span id="timeline-phase" class="phase-badge">MONITORING</span>
        </div>
    </div>

    <!-- Ensemble uncertainty panel (bottom-right) -->
    <div id="ensemble-panel" class="glass-panel ensemble-panel" style="display:none">
        <h3 class="panel-title">Ensemble Uncertainty</h3>
        <canvas id="probability-fan-canvas" width="400" height="200"></canvas>
        <div id="disagreement-badges"></div>
        <div id="member-selector"></div>
    </div>

    <!-- What-if scenario panel (right) -->
    <div id="scenario-panel" class="glass-panel scenario-panel" style="display:none">
        <h3 class="panel-title">What-If Scenario</h3>
        <div class="scenario-slider">
            <label>Rainfall: <span id="rainfall-val">120</span>mm/24h</label>
            <input type="range" id="rainfall-slider" min="0" max="300" value="120">
        </div>
        <div class="scenario-slider">
            <label>Soil Saturation: <span id="soil-val">85</span>%</label>
            <input type="range" id="soil-slider" min="0" max="100" value="85">
        </div>
        <div class="scenario-slider">
            <label>Dam Break: T+<span id="dam-val">—</span>h</label>
            <input type="range" id="dam-slider" min="0" max="48" value="0">
        </div>
        <button id="scenario-run" class="btn-primary">▶ Re-run Forecast</button>
        <div id="scenario-diff" class="scenario-diff"></div>
    </div>

    <!-- Spatial "why" card (appears on click) -->
    <div id="why-card" class="glass-panel why-card" style="display:none"></div>

    <!-- Chat drawer (secondary) -->
    <button id="chat-toggle" class="glass-panel chat-toggle">💬</button>
    <div id="chat-drawer" class="glass-panel chat-drawer" style="display:none">
        <h3 class="panel-title">Ask FloodOps</h3>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Ask about the flood...">
            <button id="chat-send" class="btn-primary">→</button>
        </div>
    </div>

    <!-- Google Maps script (loaded async) -->
    <script>
        window.FLOODOPS_CONFIG = {
            apiUrl: import.meta.env?.VITE_API_URL || '/api/v1',
            wsUrl: import.meta.env?.VITE_WS_URL || `ws://${location.host}/ws/flood`,
            mapsApiKey: import.meta.env?.VITE_GOOGLE_MAPS_API_KEY || '',
            center: { lat: 27.7, lng: 85.32 },
            zoom: 12,
        };
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=&libraries=geometry,visualization&callback=Function.prototype" async defer></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
